! =============================================================================== !
! EulerLTS sample for the flat-plate tutorial.
!
! Intended use:
!   - steady pseudo-time marching with TimeDiscMethod = ltseuler
!   - equation system: rans_komega0
!   - requires a build with:
!       FLEXI_EQNSYSNAME=rans_komega0
!       FLEXI_LOCALTIMESTEPPING=ON
!       FLEXI_SPLIT_DG=ON
!       FLEXI_PARABOLIC=ON
!       FLEXI_EDDYVISCOSITY=ON
! =============================================================================== !

! OUTPUT
ProjectName      = FlatPlate_komega0_lts
Logging          = F
OutputFormat     = 0

! INTERPOLATION
N                = 4
NAnalyze         = 10

! MESH
MeshFile         = meshes/CART_HEX2D_FlatPlateC_mesh.h5
useCurveds       = F

! EQUATION
IniExactFunc     = 1
IniRefState      = 1
! The RefState and viscosity are chosen such that the Reynolds number based on
! the position along the plate is equal to 5 million at x=1, and the Mach number
! based on the free stream velocity is 0.2.
! RefState = (/rho, u, v, w, p, k, omega0/)
RefState         = (/1.125,76.,0.,0.,116035.,0.001,7605.26/)
Mu0              = 0.0000171
BoundaryName     = BC_x-
BoundaryType     = (/2, 1/)

! TIMEDISC
TimeDiscMethod   = ltseuler
TEnd             = 1.0
maxIter          = 20000
CFLScale         = 0.3
DFLScale         = 0.3

! eulerLTS-only pseudo-time controls
! Flat-plate tuning showed a stable practical range of roughly 40..400.
! 100 is a conservative-but-faster default than the original 0.1.
EulerLTSCFLFactor           = 100.0
EulerLTSDFLFactor           = 100.0
EulerLTSDensityFloorFactor  = 1.0E-10
EulerLTSPressureFloorFactor = 1.0E-10
EulerLTSTurbFloorFactor     = 1.0E-12
EulerLTSBacktrackFactor     = 0.5
EulerLTSMaxBacktrack        = 12

! RIEMANN
Riemann          = lf

! ANALYZE
Analyze_dt       = 1.0E-5
nWriteData       = 1000
CalcErrorNorms   = F
CalcBodyForces   = F
CalcBulkState    = F
CalcMeanFlux     = F
CalcWallVelocity = F
CalcTimeAverage  = F
